<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Analisador Inteligente</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1e1e2f, #2b5876);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: #ffffff;
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    animation: aparecer 0.6s ease;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

h1 {
    text-align: center;
    margin-bottom: 15px;
    color: #333;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 10px;
    transition: 0.3s;
}

input:focus {
    border-color: #2b5876;
    outline: none;
    box-shadow: 0 0 8px rgba(43,88,118,0.3);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #2b5876, #4e4376);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

select {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

#res {
    margin-top: 15px;
    padding: 10px;
    background: #f5f7fa;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
}
</style>

</head>

<body>

<div class="container">
    <h1>📊 Analisador Inteligente</h1>

    <input type="number" id="num" placeholder="Digite um número (1 a 100)">

    <button onclick="adicionar()">➕ Adicionar</button>

    <select id="lista" size="6"></select>

    <button onclick="finalizar()">📈 Analisar</button>

    <div id="res"></div>
</div>

<script>
let valores = []

function isNumero(n) {
    return n >= 1 && n <= 100
}

function inLista(n, lista) {
    return lista.indexOf(n) != -1
}

function adicionar() {
    let num = document.getElementById('num')
    let lista = document.getElementById('lista')
    let n = Number(num.value)

    if (isNumero(n) && !inLista(n, valores)) {
        valores.push(n)

        let item = document.createElement('option')
        item.text = `Valor ${n} adicionado`
        lista.appendChild(item)

        res.innerHTML = ''
    } else {
        alert('Valor inválido ou já adicionado!')
    }

    num.value = ''
    num.focus()
}

function finalizar() {
    let res = document.getElementById('res')

    if (valores.length == 0) {
        alert('Adicione valores primeiro!')
        return
    }

    let total = valores.length
    let maior = Math.max(...valores)
    let menor = Math.min(...valores)
    let soma = valores.reduce((a, b) => a + b, 0)
    let media = soma / total

    res.innerHTML = `
        <strong>📌 Resultados:</strong><br>
        Total: ${total} números <br>
        Maior valor: ${maior} <br>
        Menor valor: ${menor} <br>
        Soma: ${soma} <br>
        Média: ${media.toFixed(2)}
    `
}
</script>

</body>
</html>
